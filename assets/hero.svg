<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <!-- Warm ambient glow behind the fish mark -->
    <radialGradient id="ambient" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#d97757" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#141413" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle ring gradient -->
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#d97757" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="800" height="340" rx="14" fill="#141413"/>
  <rect width="800" height="340" rx="14" fill="url(#ambient)"/>

  <!-- Subtle grain texture dots -->
  <g opacity="0.025" fill="#faf9f5">
    <circle cx="120" cy="60" r="0.8"/><circle cx="230" cy="45" r="0.6"/><circle cx="380" cy="30" r="0.7"/>
    <circle cx="520" cy="55" r="0.8"/><circle cx="650" cy="40" r="0.6"/><circle cx="710" cy="70" r="0.7"/>
    <circle cx="90" cy="280" r="0.6"/><circle cx="200" cy="300" r="0.8"/><circle cx="580" cy="290" r="0.7"/>
    <circle cx="700" cy="310" r="0.6"/><circle cx="450" cy="315" r="0.8"/><circle cx="340" cy="305" r="0.6"/>
  </g>

  <!-- ===== FISH LOGO MARK ===== -->
  <!-- Outer ring — very subtle halo -->
  <circle cx="400" cy="108" r="52" fill="none" stroke="#b0aea5" stroke-width="0.4" opacity="0.15"/>

  <g transform="translate(400, 108)">
    <!-- Fish body — refined geometric shape -->
    <path d="M-22 0 C-14 -16, 10 -16, 24 -6 C30 -2, 30 2, 24 6 C10 16, -14 16, -22 0Z" fill="#d97757"/>
    <!-- Tail — clean chevron -->
    <path d="M-22 0 L-36 -14 L-28 0 L-36 14 Z" fill="#d97757" opacity="0.7"/>
    <!-- Fin — subtle detail -->
    <path d="M-2 -10 Q4 -18 10 -12" stroke="#141413" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Eye — sharp, alive -->
    <circle cx="14" cy="-3" r="3.5" fill="#141413"/>
    <circle cx="15.5" cy="-4" r="1.4" fill="#faf9f5"/>
    <!-- Gill line -->
    <path d="M6 -6 Q4 0 6 6" stroke="#141413" stroke-width="0.8" fill="none" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- ===== BRAND MARK ===== -->
  <!-- Chinese title + English as unified wordmark -->
  <text x="400" y="192" font-family="Poppins, 'Noto Sans SC', Arial, sans-serif" font-size="46" font-weight="700" fill="#faf9f5" text-anchor="middle" letter-spacing="4">摸鱼</text>
  <text x="400" y="216" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="400" fill="#d97757" text-anchor="middle" letter-spacing="4">MOYU</text>

  <!-- ===== TAGLINE ===== -->
  <text x="400" y="248" font-family="Georgia, 'Lora', 'Noto Serif SC', serif" font-size="12.5" fill="#b0aea5" text-anchor="middle" font-style="italic">Anti-Over-Engineering for AI Coding Agents</text>

  <!-- ===== STATS BAR ===== -->
  <!-- Thin separator -->
  <line x1="220" y1="268" x2="580" y2="268" stroke="#b0aea5" stroke-width="0.3" opacity="0.15"/>

  <g transform="translate(400, 300)" text-anchor="middle">
    <!-- −66% -->
    <g transform="translate(-195, 0)">
      <text y="-4" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#d97757">−66%</text>
      <text y="12" font-family="Poppins, Arial, sans-serif" font-size="8.5" fill="#b0aea5" letter-spacing="1.5">CODE</text>
    </g>

    <!-- Divider dot -->
    <circle cx="-120" cy="2" r="1.5" fill="#b0aea5" opacity="0.2"/>

    <!-- 10 Platforms -->
    <g transform="translate(-65, 0)">
      <text y="-4" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#6a9bcc">10</text>
      <text y="12" font-family="Poppins, Arial, sans-serif" font-size="8.5" fill="#b0aea5" letter-spacing="1.5">PLATFORMS</text>
    </g>

    <!-- Divider dot -->
    <circle cx="10" cy="2" r="1.5" fill="#b0aea5" opacity="0.2"/>

    <!-- 5 Variants -->
    <g transform="translate(65, 0)">
      <text y="-4" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#788c5d">5</text>
      <text y="12" font-family="Poppins, Arial, sans-serif" font-size="8.5" fill="#b0aea5" letter-spacing="1.5">VARIANTS</text>
    </g>

    <!-- Divider dot -->
    <circle cx="120" cy="2" r="1.5" fill="#b0aea5" opacity="0.2"/>

    <!-- 3 Languages -->
    <g transform="translate(195, 0)">
      <text y="-4" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#d97757">3</text>
      <text y="12" font-family="Poppins, Arial, sans-serif" font-size="8.5" fill="#b0aea5" letter-spacing="1.5">LANGUAGES</text>
    </g>
  </g>
</svg>
