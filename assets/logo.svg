  <!-- Water bubbles (pixel circles) -->
  <g fill="#6a9bcc" opacity="0.3">
    <rect x="86" y="70" width="3" height="3" rx="1"/>
    <rect x="92" y="64" width="2" height="2" rx="1"/>
