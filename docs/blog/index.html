.nav-btn:hover{border-color:var(--brand-orange);color:var(--brand-orange)}
.nav-btn svg{width:16px;height:16px}

.container{max-width:760px;margin:0 auto;padding:80px 24px}
.container h1{font-size:2rem;margin-bottom:48px}

.post-card{background:var(--surface-1);border:1px solid var(--border-color);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;transition:transform .2s,box-shadow .2s}
